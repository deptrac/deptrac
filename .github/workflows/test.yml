name: "Tests"
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "**"

jobs:
  unit-tests:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        php-version: [8.1, 8.2, 8.3, 8.4]

    steps:
      - name: "Checkout"
        uses: actions/checkout@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, ctype, iconv
          coverage: none
          tools: composer

      - name: "Install dependencies"
        uses: ramsey/composer-install@v2

      - name: "Run tests"
        run: make tests

  infection:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]
        php-version: [8.2, 8.3, 8.4]

    steps:
      - name: "Checkout"
        uses: actions/checkout@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, ctype, iconv
          coverage: xdebug
          tools: composer

      - name: "Install dependencies"
        uses: ramsey/composer-install@v2

      - name: "Run infection"
        run: make infection

  deptrac:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        php-version: [8.1, 8.2, 8.3, 8.4]

    steps:
      - name: "Checkout"
        uses: actions/checkout@v2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, xml, ctype, iconv
          coverage: none
          tools: composer

      - name: "Install dependencies"
        uses: ramsey/composer-install@v2

      - name: "Run deptrac"
        run: make deptrac
